<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Salman R Rana — Software Engineer. A scroll-driven sky-glitch splash portfolio." />
    <meta name="theme-color" content="#05060a" />
    <title>Salman R Rana — Software Engineer</title>
    <link rel="stylesheet" href="src/styles.css" />
    <!--
      Progressive enhancement flag, set synchronously before first paint so the
      scroll-driven title/outro can start hidden WITHOUT a flash of the static
      page. With JS disabled this class is never added, so styles.css leaves the
      title and links fully visible and legible.
    -->
    <script>
      document.documentElement.classList.add("js");
    </script>
  </head>
  <body>
    <noscript>
      <p class="noscript-note">
        This portfolio uses JavaScript (and WebGL) for its scroll-driven sky-glitch
        experience. Please enable JavaScript to view it.
      </p>
    </noscript>

    <!--
      Tall scroll container (400vh) drives the timeline. The visual stage inside
      it is sticky-pinned to the viewport, so scrolling advances the experience
      (progress 0..1) while the hero stays full-bleed. Later tickets layer the
      WebGL sky-glitch canvas over this same stage and the title reveal/outro
      onto the timeline. data-scroll-root is what timeline.js measures.
    -->
    <main class="scroll" data-scroll-root>
      <section class="stage" aria-label="Salman R Rana — Software Engineer">
        <!--
          Full-bleed background hero video. Decorative (aria-hidden): the
          accessible title lives in .stage__content below. Sources are injected
          by main.js so the right resolution (720 vs 1080) is chosen per device
          without the browser pre-fetching a size it won't use. The poster paints
          instantly via CSS background; the video fades in on `canplay`.
        -->
        <video
          class="stage__video"
          data-hero-video
          poster="public/assets/hero-poster.jpg"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
          aria-hidden="true"
        ></video>

        <!--
          WebGL sky-glitch canvas. main.js renders the playing <video> through a
          fragment shader that corrupts only the masked sky and draws it here,
          layered over the raw <video> (which keeps playing purely as the texture
          source). It stays invisible until the first rendered frame, then CSS
          cross-fades it in — so poster → video → glitch hands off seamlessly. If
          WebGL/the mask is unavailable (or reduced-motion), it never activates
          and the plain <video> remains the hero.
        -->
        <canvas class="stage__canvas" data-glitch-canvas aria-hidden="true"></canvas>

        <div class="stage__scrim" aria-hidden="true"></div>

        <!--
          Overlay layer: the title and the outro links are stacked in the same
          centered cell (they never show at the same time). scenes.js subscribes
          to the timeline and drives their reveal/fade/outro per scroll scene.
        -->
        <div class="stage__content">
          <h1 class="hero__title" data-title>
            <span class="hero__name">Salman R Rana</span>
            <span class="hero__sep" aria-hidden="true">||</span>
            <span class="hero__role">Software Engineer</span>
          </h1>

          <!--
            Outro links. These are the only two calls-to-action in the splash.
            ┌─ EDIT HERE ────────────────────────────────────────────────────┐
            │ Contact  → update the mailto: address below.                    │
            │ Projects → replace the "#projects" placeholder with the real    │
            │            projects URL (or keep it as an in-page anchor).      │
            └────────────────────────────────────────────────────────────────┘
          -->
          <nav class="outro" data-outro aria-label="Get in touch">
            <a class="outro__link" href="mailto:mrhuman515@gmail.com">Contact</a>
            <a class="outro__link" href="#projects">Projects</a>
          </nav>
        </div>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
