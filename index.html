<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Salman R Rana — Software Engineer. A scroll-driven sky-glitch splash portfolio." />
    <meta name="theme-color" content="#05060a" />
    <!-- The design is dark; declaring it keeps form controls / UA chrome dark and
         stops a flash of a white poster background on first paint. -->
    <meta name="color-scheme" content="dark light" />
    <title>Salman R Rana — Software Engineer</title>

    <!--
      Social / Open Graph + Twitter cards. The poster doubles as the share image.
      ┌─ EDIT ON DEPLOY ───────────────────────────────────────────────────────┐
      │ og:url and og:image should be ABSOLUTE URLs once the Netlify domain is   │
      │ known (most scrapers resolve relative og:image, but absolute is safest). │
      │ Replace https://example.netlify.app with the real site URL.             │
      └──────────────────────────────────────────────────────────────────────────┘
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Salman R Rana — Software Engineer" />
    <meta property="og:description" content="A scroll-driven sky-glitch splash portfolio." />
    <meta property="og:image" content="public/assets/hero-poster.jpg" />
    <meta property="og:url" content="https://example.netlify.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Salman R Rana — Software Engineer" />
    <meta name="twitter:description" content="A scroll-driven sky-glitch splash portfolio." />
    <meta name="twitter:image" content="public/assets/hero-poster.jpg" />
    <link rel="stylesheet" href="src/styles.css" />
    <!--
      Progressive enhancement flag, set synchronously before first paint so the
      scroll-driven title/outro can start hidden WITHOUT a flash of the static
      page. With JS disabled this class is never added, so styles.css leaves the
      title and links fully visible and legible.

      Self-heal: this inline script always runs, but the actual reveal depends on
      the ES-module app booting. If that pipeline fails (bad deploy, network blip,
      a module syntax/runtime error), the fallback below removes `js` and reveals
      the static title/links — never leaving the page stuck with no content (which
      would be worse than the no-JS path). main.js cancels it the instant it runs.
    -->
    <script>
      document.documentElement.classList.add("js");
      window.__scrollNarrativeFallback = window.setTimeout(function () {
        document.documentElement.classList.remove("js");
      }, 3000);
    </script>
  </head>
  <body>
    <!--
      Non-scroll access to the calls-to-action (hardening / a11y).

      The narrative reveals Contact/Projects only at the end of a 400vh scroll, so
      keyboard and prefers-reduced-motion users need a path that doesn't require
      the full journey. This skip link + minimal nav provides it:
        • The skip link is the first focusable element — Tab once, Enter, and the
          nav is focused/revealed (classic a11y skip pattern).
        • The nav is always in the DOM and focusable; it stays visually out of the
          way during the full-motion experience and slides in on focus, and is
          shown persistently under reduced motion (where there is no scroll show).
      Keep these hrefs in sync with the outro <nav class="outro"> below.
    -->
    <a class="skip-link" href="#site-nav">Skip to contact &amp; projects</a>
    <nav class="site-nav" id="site-nav" aria-label="Quick links">
      <a class="site-nav__link" href="mailto:mrhuman515@gmail.com">Contact</a>
      <a class="site-nav__link" href="#projects">Projects</a>
    </nav>

    <noscript>
      <p class="noscript-note">
        This portfolio uses JavaScript (and WebGL) for its scroll-driven sky-glitch
        experience. Please enable JavaScript to view it.
      </p>
    </noscript>

    <!--
      Tall scroll container (400vh) drives the timeline. The visual stage inside
      it is sticky-pinned to the viewport, so scrolling advances the experience
      (progress 0..1) while the hero stays full-bleed. Later tickets layer the
      WebGL sky-glitch canvas over this same stage and the title reveal/outro
      onto the timeline. data-scroll-root is what timeline.js measures.
    -->
    <main class="scroll" data-scroll-root>
      <section class="stage" aria-label="Salman R Rana — Software Engineer">
        <!--
          Full-bleed background hero video. Decorative (aria-hidden): the
          accessible title lives in .stage__content below. Sources are injected
          by main.js so the right resolution (720 vs 1080) is chosen per device
          without the browser pre-fetching a size it won't use. The poster paints
          instantly via CSS background; the video fades in on `canplay`.
        -->
        <video
          class="stage__video"
          data-hero-video
          poster="public/assets/hero-poster.jpg"
          autoplay
          muted
          loop
          playsinline
          preload="auto"
          aria-hidden="true"
        ></video>

        <!--
          WebGL sky-glitch canvas. main.js renders the playing <video> through a
          fragment shader that corrupts only the masked sky and draws it here,
          layered over the raw <video> (which keeps playing purely as the texture
          source). It stays invisible until the first rendered frame, then CSS
          cross-fades it in — so poster → video → glitch hands off seamlessly. If
          WebGL/the mask is unavailable (or reduced-motion), it never activates
          and the plain <video> remains the hero.
        -->
        <canvas class="stage__canvas" data-glitch-canvas aria-hidden="true"></canvas>

        <div class="stage__scrim" aria-hidden="true"></div>

        <!--
          Overlay layer: the title and the outro links are stacked in the same
          centered cell (they never show at the same time). scenes.js subscribes
          to the timeline and drives their reveal/fade/outro per scroll scene.
        -->
        <div class="stage__content">
          <h1 class="hero__title" data-title>
            <span class="hero__name">Salman R Rana</span>
            <span class="hero__sep" aria-hidden="true">||</span>
            <span class="hero__role">Software Engineer</span>
          </h1>

          <!--
            Outro links. These are the only two calls-to-action in the splash.
            ┌─ EDIT HERE ────────────────────────────────────────────────────┐
            │ Contact  → update the mailto: address below.                    │
            │ Projects → replace the "#projects" placeholder with the real    │
            │            projects URL (or keep it as an in-page anchor).      │
            └────────────────────────────────────────────────────────────────┘
          -->
          <nav class="outro" data-outro aria-label="Get in touch">
            <a class="outro__link" href="mailto:mrhuman515@gmail.com">Contact</a>
            <a class="outro__link" href="#projects">Projects</a>
          </nav>
        </div>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
